openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document upload, listing, and management
  - name: questions
    description: Asking questions about uploaded documents
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stats:
    get:
      operationId: getStats
      tags: [documents]
      summary: Get aggregate stats across the library
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryStats"
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all uploaded documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get one document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document and all related data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document properties (title and/or kind)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentPayload"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /documents/{id}/pages/{pageNumber}:
    get:
      operationId: getDocumentPage
      tags: [documents]
      summary: Get the text content of a single page
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: pageNumber
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentPage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /documents/{id}/questions:
    get:
      operationId: listDocumentQuestions
      tags: [questions]
      summary: List previous questions asked about this document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Questions for this document
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionRecord"
    post:
      operationId: askDocumentQuestion
      tags: [questions]
      summary: Ask a question and get an AI-generated answer with citations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskQuestionBody"
      responses:
        "200":
          description: Answer with citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /documents/{id}/questions/from-image:
    post:
      operationId: askDocumentFromImage
      tags: [questions]
      summary: Upload an image of one or more questions and answer all of them based on the document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: One or more answered questions extracted from the image
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: No questions were detected in the image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /documents/recent-questions:
    get:
      operationId: listRecentQuestions
      tags: [questions]
      summary: Recent questions across all documents
      responses:
        "200":
          description: Recent questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentQuestion"
  /documents/{id}/chapters:
    get:
      operationId: listDocumentChapters
      tags: [quizzes]
      summary: List the auto-detected chapters of a document
      description: Extracts chapters lazily on first call and caches them.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chapters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chapter"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /documents/{id}/quizzes:
    get:
      operationId: listDocumentQuizzes
      tags: [quizzes]
      summary: List saved quizzes for this document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quizzes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quiz"
    post:
      operationId: createDocumentQuiz
      tags: [quizzes]
      summary: Generate and save a new quiz from selected chapters
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuizBody"
      responses:
        "201":
          description: The created quiz with its generated questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Could not generate questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /quizzes/{quizId}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      summary: Get one quiz with all its questions
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteQuiz
      tags: [quizzes]
      summary: Delete a quiz and all its attempts
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /quizzes/{quizId}/attempts:
    get:
      operationId: listQuizAttempts
      tags: [quizzes]
      summary: List all past attempts for a quiz, newest first
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attempts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizAttempt"
    post:
      operationId: submitQuizAttempt
      tags: [quizzes]
      summary: Submit answers and get the graded attempt back
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAttemptBody"
      responses:
        "201":
          description: Graded attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizAttempt"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        filename:
          type: string
        totalPages:
          type: integer
        status:
          type: string
          enum: [processing, ready, failed]
        errorMessage:
          type: ["string", "null"]
        kind:
          type: string
          enum: [curriculum, question_bank]
        questionCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - filename
        - totalPages
        - status
        - errorMessage
        - kind
        - questionCount
        - createdAt
    DocumentPage:
      type: object
      properties:
        documentId:
          type: integer
        pageNumber:
          type: integer
        pageLabel:
          type: string
          nullable: true
          description: Printed page label (may differ from the PDF index). Null when not provided by the PDF.
        content:
          type: string
      required:
        - documentId
        - pageNumber
        - content
    Citation:
      type: object
      properties:
        pageNumber:
          type: integer
          description: PDF page index (1-based, used to navigate the source viewer).
        pageLabel:
          type: string
          nullable: true
          description: Printed page label as shown in the document, when it differs from the PDF index.
        quote:
          type: string
      required:
        - pageNumber
        - quote
    AskQuestionBody:
      type: object
      properties:
        question:
          type: string
          minLength: 1
      required:
        - question
    QuestionRecord:
      type: object
      properties:
        id:
          type: integer
        documentId:
          type: integer
        question:
          type: string
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - documentId
        - question
        - answer
        - citations
        - createdAt
    RecentQuestion:
      type: object
      properties:
        id:
          type: integer
        documentId:
          type: integer
        documentTitle:
          type: string
        question:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - documentId
        - documentTitle
        - question
        - createdAt
    LibraryStats:
      type: object
      properties:
        documentCount:
          type: integer
        readyDocumentCount:
          type: integer
        processingDocumentCount:
          type: integer
        totalPages:
          type: integer
        totalQuestions:
          type: integer
      required:
        - documentCount
        - readyDocumentCount
        - processingDocumentCount
        - totalPages
        - totalQuestions
    Chapter:
      type: object
      properties:
        id:
          type: integer
        documentId:
          type: integer
        orderIndex:
          type: integer
        title:
          type: string
        summary:
          type: ["string", "null"]
        startPage:
          type: integer
        endPage:
          type: integer
      required:
        - id
        - documentId
        - orderIndex
        - title
        - summary
        - startPage
        - endPage
    QuizQuestionType:
      type: string
      enum:
        - mcq
        - true_false
        - fill_blank
        - short_answer
        - comparison_table
        - list_factors
        - odd_one_out
    ComparisonTable:
      type: object
      description: Reference data for a comparison_table question.
      properties:
        headers:
          type: array
          items:
            type: string
          description: Column headers — usually the concepts being compared.
        rows:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
                description: Row label (the property/aspect being compared).
              cells:
                type: array
                items:
                  type: string
                description: Reference cell values, one per header.
            required:
              - label
              - cells
      required:
        - headers
        - rows
    OddOneOut:
      type: object
      description: Reference data for an odd_one_out question.
      properties:
        different:
          type: string
          description: The literal odd word among `choices`.
        reason:
          type: string
          description: Reference reasoning explaining why it is the odd one.
      required:
        - different
        - reason
    QuizDifficulty:
      type: string
      enum: [easy, medium, hard, mixed]
    QuizSettings:
      type: object
      properties:
        randomizeQuestions:
          type: boolean
        randomizeChoices:
          type: boolean
        timeLimitMinutes:
          type: ["integer", "null"]
        difficulty:
          $ref: "#/components/schemas/QuizDifficulty"
        allowedTypes:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestionType"
      required:
        - randomizeQuestions
        - randomizeChoices
        - difficulty
        - allowedTypes
    QuizQuestion:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/QuizQuestionType"
        prompt:
          type: string
        choices:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
          description: |
            For mcq/true_false: the literal correct option text.
            For fill_blank/short_answer: the reference answer.
            For comparison_table / list_factors / odd_one_out: a JSON-encoded
            string of the same shape as `comparison`, `factors`, or
            `oddOneOut` respectively (kept here for backward compatibility
            with grading).
        explanation:
          type: string
        pageNumber:
          type: integer
        pageLabel:
          type: ["string", "null"]
        points:
          type: integer
        comparison:
          $ref: "#/components/schemas/ComparisonTable"
        factors:
          type: array
          items:
            type: string
          description: Reference list of factors for a list_factors question.
        oddOneOut:
          $ref: "#/components/schemas/OddOneOut"
      required:
        - id
        - type
        - prompt
        - correctAnswer
        - points
    Quiz:
      type: object
      properties:
        id:
          type: integer
        documentId:
          type: integer
        name:
          type: string
        chapterIds:
          type: array
          items:
            type: integer
        settings:
          $ref: "#/components/schemas/QuizSettings"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - documentId
        - name
        - chapterIds
        - settings
        - questions
        - createdAt
    CreateQuizBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        chapterIds:
          type: array
          items:
            type: integer
          description: Empty array means "all chapters / whole document".
        count:
          type: integer
          minimum: 1
          maximum: 50
        settings:
          $ref: "#/components/schemas/QuizSettings"
      required:
        - name
        - count
        - settings
    AttemptItem:
      type: object
      properties:
        questionId:
          type: string
        userAnswer:
          type: string
        score:
          type: number
          description: Fractional score 0..1 awarded for this question.
        verdict:
          type: string
          enum: [correct, partial, wrong, empty]
        feedback:
          type: string
      required:
        - questionId
        - userAnswer
        - score
        - verdict
    QuizAttempt:
      type: object
      properties:
        id:
          type: integer
        quizId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/AttemptItem"
        score:
          type: integer
        maxScore:
          type: integer
        completed:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - quizId
        - items
        - score
        - maxScore
        - completed
        - createdAt
    SubmitAttemptAnswer:
      type: object
      properties:
        questionId:
          type: string
        userAnswer:
          type: string
      required:
        - questionId
        - userAnswer
    SubmitAttemptBody:
      type: object
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/SubmitAttemptAnswer"
        questionIds:
          type: array
          items:
            type: string
          description: |
            When set, only these question ids are graded and counted toward
            the attempt's max score. Used by the "retake wrong questions
            only" flow.
      required:
        - answers
    UpdateDocumentPayload:
      type: object
      properties:
        title:
          type: string
        kind:
          type: string
          enum: [curriculum, question_bank]
