kind = "web"
previewPath = "/"
title = "مذاكر الذكي - Study AI"
version = "1.0.0"
id = "artifacts/study-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19139

[services.development]
run = "pnpm --filter @workspace/study-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-ai", "run", "build" ]
publicDir = "artifacts/study-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19139"
BASE_PATH = "/"
